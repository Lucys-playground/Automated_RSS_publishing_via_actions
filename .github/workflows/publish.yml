name: Publish daily post

on:
  schedule:
    - cron: "5 8 * * *"
      timezone: "Europe/Prague"
  workflow_dispatch:
    inputs:
      publish_date:
        description: "Volitelně datum YYYY-MM-DD pro ruční test"
        required: false
        type: string
      rebuild_all:
        description: "Přegenerovat všechny už publikované HTML stránky"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build site
        env:
          SITE_URL: https://lucys-playground.github.io/Automated_RSS_publishing_via_actions
          SITE_TITLE: Španělština
          SITE_DESCRIPTION: Krátké španělské texty a dialogy pro začátečníky.
          PUBLISH_TZ: Europe/Prague
          PUBLISH_DATE: ${{ github.event.inputs.publish_date || '' }}
          REBUILD_ALL: ${{ github.event.inputs.rebuild_all == 'true' && '1' || '' }}
        run: python scripts/build.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/published.json docs/
          git diff --cached --quiet || git commit -m "Publish daily post"
          git push
