name: Publish daily post

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build site
        env:
          SITE_URL: https://lucys-playground.github.io/Automated_RSS_publishing_via_actions
          SITE_TITLE: Španělština
          SITE_DESCRIPTION: Krátké španělské texty a dialogy pro začátečníky.
        run: python scripts/build.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/published.json site/
          git diff --cached --quiet || git commit -m "Publish daily post"
          git push
