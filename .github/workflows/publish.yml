name: Publish scheduled post

on:
  workflow_dispatch:
  schedule:
    - cron: "5 6 * * *" # každý den v 06:05 UTC

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run builder
        env:
          SITE_URL: "https://lucys-playground.github.io/Automated_RSS_publishing_via_actions"
        run: python scripts/build.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/published.json site/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Publish scheduled content"
            git push
          fi
